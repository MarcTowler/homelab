---
# Media-arr group variables - all *arr services port mappings and configuration

# Service port mapping for Traefik routing
service_port_mapping:
  sonarr: 8989
  radarr: 7878
  lidarr: 8686
  prowlarr: 9696
  bazarr: 6767
  qbittorrent: 8080
  flaresolverr: 8191
  jellyfin: 8096

# Service subdomains for DNS/Traefik
service_subdomains:
  sonarr: "sonarr"
  radarr: "radarr"
  lidarr: "lidarr"
  prowlarr: "prowlarr"
  bazarr: "bazarr"
  qbittorrent: "qbittorrent"
  flaresolverr: "flaresolverr"
  jellyfin: "jellyfin"

# Domain name (inherited from group_vars/all.yml)
domain_name: "itslit.me.uk"

# Media paths configuration
media_paths:
  media: "/media"
  downloads: "/downloads"
  config_base: "/config"

# Node Exporter monitoring
node_exporter_port: 9100

# Service descriptions for documentation
service_descriptions:
  sonarr: "TV Series Management & Automation"
  radarr: "Movie Management & Automation"
  lidarr: "Music Library Management"
  prowlarr: "Indexer Management & Discovery"
  bazarr: "Subtitle Management & Download"
  qbittorrent: "Torrent Client & Download Manager"
  flaresolverr: "CAPTCHA/CloudFlare Bypass Solver"
  jellyfin: "Media Server & Content Streaming"

# Traefik integration settings
traefik_enabled: true
traefik_basic_auth_enabled: true
traefik_domain: "{{ domain_name }}"
traefik_https_enabled: true

# Default credentials for initial setup (should be changed post-deployment)
# These are stored in vault in production
qbittorrent_default_user: "admin"
qbittorrent_default_password: "adminPassword"  # Should be from vault

# Resource monitoring
enable_prometheus_monitoring: true
prometheus_scrape_interval: 30s

# Jellyfin plugin configuration
# Plugins to install automatically via Ansible
# Each plugin requires: name, guid (from Jellyfin plugin repository)
# Optionally specify version (defaults to latest)
jellyfin_plugins:
  - name: "Trakt"
    guid: "a4df60c5-6ab4-412a-8f79-2cab93fb2bc5"
    description: "Scrobble watched content to Trakt.tv"
  
  - name: "TheTVDB"
    guid: "a677c0da-fac5-4cde-941a-7134223f14c8"
    description: "Metadata provider for TV shows"
  
  - name: "Open Subtitles"
    guid: "4b9ed42f-5185-48b5-9803-6ff2989014c4"
    description: "Download subtitles from OpenSubtitles.org"
  
  - name: "Fanart"
    guid: "b2a6935b-9ca6-4d9f-8d3e-d9a30c6a5f83"
    description: "Enhanced artwork and fanart provider"
  
  - name: "Playback Reporting"
    guid: "5c53438191a343cb907a35aa02eb9d2c"
    description: "Track playback statistics and viewing habits"

# Additional available plugins (uncomment to enable):
# - name: "Kodi Sync Queue"
#   guid: "aff7e100-ef3d-4cdb-b3fb-f5f9bd6ca8d4"
#   description: "Sync Jellyfin library with Kodi"
#
# - name: "LDAP Authentication"
#   guid: "958aad66-3784-4d2a-b89a-a7b6fab6e25c"
#   description: "Enterprise LDAP/AD authentication"
#
# - name: "Anime"
#   guid: "0417364b-5a93-4ad0-a1f0-b87569a7cf8c"
#   description: "Enhanced anime metadata from AniDB"

# Docker Compose Service Definitions
# Add new services to this list - eliminates need to manually edit docker-compose.yml
media_arr_services:
  - name: sonarr
    description: "Sonarr - TV Series Management"
    image: "linuxserver/sonarr:latest"
    ports:
      - "8989:8989"
    volumes:
      - "/config/sonarr:/config"
      - "/media:/media"
      - "/downloads:/downloads"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "UTC"
  
  - name: radarr
    description: "Radarr - Movie Management"
    image: "linuxserver/radarr:latest"
    ports:
      - "7878:7878"
    volumes:
      - "/config/radarr:/config"
      - "/media:/media"
      - "/downloads:/downloads"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "UTC"
  
  - name: lidarr
    description: "Lidarr - Music Management"
    image: "linuxserver/lidarr:latest"
    ports:
      - "8686:8686"
    volumes:
      - "/config/lidarr:/config"
      - "/media:/media"
      - "/downloads:/downloads"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "UTC"
  
  - name: prowlarr
    description: "Prowlarr - Indexer Management"
    image: "linuxserver/prowlarr:latest"
    ports:
      - "9696:9696"
    volumes:
      - "/config/prowlarr:/config"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "UTC"
  
  - name: bazarr
    description: "Bazarr - Subtitle Management"
    image: "linuxserver/bazarr:latest"
    ports:
      - "6767:6767"
    volumes:
      - "/config/bazarr:/config"
      - "/media:/media"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "UTC"
  
  - name: qbittorrent
    description: "qBittorrent - Torrent Client"
    image: "linuxserver/qbittorrent:latest"
    ports:
      - "6881:6881"
      - "6881:6881/udp"
      - "8080:8080"
    volumes:
      - "/config/qbittorrent:/config"
      - "/downloads:/downloads"
      - "/media:/media"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "UTC"
      WEBUI_PORT: "8080"
  
  - name: flaresolverr
    description: "FlareSolverr - CAPTCHA/CloudFlare bypass for indexers"
    image: "flaresolverr/flaresolverr:latest"
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: "info"
      CAPTCHA_SOLVER: "hcaptcha"
  
  - name: jellyfin
    description: "Jellyfin - Media Server (UI for watching content)"
    image: "jellyfin/jellyfin:latest"
    ports:
      - "8096:8096"
    volumes:
      - "/config/jellyfin:/config"
      - "/config/jellyfin/cache:/cache"
      - "/media:/media:ro"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "UTC"
