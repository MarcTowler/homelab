---
# GitHub Actions Runner Configuration Variables (LitBot Personal Repo)

# Runner user and paths
runner_user: github
runner_linux_group: github
runner_home: /var/lib/github-actions-runner
runner_install_dir: /opt/actions-runner

# Runner version (check https://github.com/actions/runner/releases for latest)
runner_version: "2.311.0"

# Systemd service configuration
runner_service_name: github-runner
runner_service_description: "GitHub Actions Runner Service"

# Resource constraints for runner service
runner_memory_limit: "8G"
runner_cpu_quota: "400%"

# Node exporter for monitoring GitHub runner metrics
node_exporter_version: "1.7.0"
node_exporter_port: 9100

# GitHub API Configuration for automated token generation
# Uses personal PAT for personal repo runner registration
# Store in ansible/inventory/secrets.yml as:
# github_pat_personal: "your_token"
github_api_url: "https://api.github.com"
github_pat: "{{ github_pat_personal }}"

# Runner registration configuration
github_runner_registrations:
  - type: "repo"
    value: "marctowler/LitBot"
    labels: "ubuntu,docker,linux,personal,litbot"

# Runner naming
github_runner_name: "{{ inventory_hostname }}"
github_runner_work_dir: "{{ runner_home }}/work"

# Check if runner is already registered before running registration
github_runner_check_registration: true
