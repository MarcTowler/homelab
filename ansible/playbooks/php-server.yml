---
# API Server role - Apache + PHP configuration
- name: Install and configure Apache API server
  hosts: api_servers
  gather_facts: yes
  become: yes

  pre_tasks:
    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_facts["os_family"] == "Debian"

  tasks:
    - name: Install Apache and PHP packages
      apt:
        name:
          - apache2
          - apache2-utils
          - libapache2-mod-php8.1
          - php8.1
          - php8.1-fpm
          - php8.1-cli
          - php8.1-curl
          #- php8.1-json
          - php8.1-mbstring
          - php8.1-xml
          - php8.1-zip
          - php8.1-gd
          - php8.1-mysql
          - php8.1-pdo
          - composer
          - git
        state: present
      when: ansible_facts["os_family"] == "Debian"

    - name: Enable Apache modules
      apache2_module:
        name: "{{ item }}"
        state: present
      loop:
        - rewrite
        - php8.1
        - headers
        - ssl
      notify: reload apache2

    - name: Disable Apache default site
      command: a2dissite 000-default
      ignore_errors: yes
      notify: reload apache2

  handlers:
    - name: reload apache2
      systemd:
        name: apache2
        state: reloaded

    - name: restart apache2
      systemd:
        name: apache2
        state: restarted
