---
# Website Server Playbook
# Deploy keys are loaded from vault (workflow secrets may optionally pre-seed files)

- name: Deploy Website
  hosts: site
  gather_facts: yes
  become: yes

  roles:
    - role: php-app
      vars:
        app_name: website
        app_root: /var/www/Website
        repo_url: git@github.com:ItsLit-Media-and-Development/Website.git
        deploy_key: website_deploy_key
        git_branch: Dev

