---
# Website Server Playbook (Refactored to use php-app role)
# Reduced from 134 lines to 24 lines using centralized role

- name: Prepare deploy keys on Ansible controller
  hosts: localhost
  gather_facts: no
  vars:
    role_files_dir: "{{ playbook_dir }}/../roles/php-app/files"
  pre_tasks:
    - name: Load vault secrets
      include_vars:
        file: ../inventory/secrets.yml

  tasks:
    - name: Ensure role files directory exists
      file:
        path: "{{ role_files_dir }}"
        state: directory
        mode: '0755'
    
    - name: Create deploy key file in role directory
      copy:
        content: "{{ website_deploy_key }}"
        dest: "{{ role_files_dir }}/website_deploy_key"
        mode: '0600'

- name: Deploy Website
  hosts: site
  gather_facts: yes
  become: yes

  roles:
    - role: php-app
      vars:
        app_name: website
        app_root: /var/www/Website
        repo_url: git@github.com:ItsLit-Media-and-Development/Website.git
        deploy_key: website_deploy_key
        git_branch: Dev
