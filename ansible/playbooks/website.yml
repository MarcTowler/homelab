---
# Website Server Playbook (Refactored to use php-app role)
# Reduced from 134 lines to 24 lines using centralized role

- name: Deploy Website
  hosts: site
  gather_facts: yes
  become: yes

  pre_tasks:
    - name: Load vault secrets
      include_vars:
        file: ../inventory/secrets.yml

  roles:
    - role: php-app
      vars:
        app_name: website
        app_root: /var/www/Website
        repo_url: git@github.com:ItsLit-Media-and-Development/Website.git
        deploy_key: website_deploy_key
        git_branch: Main
