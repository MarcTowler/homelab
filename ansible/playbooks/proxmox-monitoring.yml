---
# Proxmox Node Monitoring Setup - Minimal Install
# This playbook installs ONLY the monitoring agent on Proxmox nodes
# No bloat, just what's needed for Grafana observability
- name: Configure Proxmox nodes for monitoring
  hosts: "{{ cluster_nodes }}"  # Target only the Proxmox nodes
  gather_facts: yes
  become: yes

  vars:
    node_exporter_version: "1.7.0"
    node_exporter_install_dir: /opt/node_exporter
    node_exporter_user: node_exporter
    node_exporter_port: 9100

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install essential tools (minimal)
      apt:
        name:
          - curl
          - wget
          - ca-certificates
        state: present

    - name: Create node_exporter user
      user:
        name: "{{ node_exporter_user }}"
        shell: /usr/sbin/nologin
        home: /var/lib/node_exporter
        state: present

    - name: Create node_exporter directory
      file:
        path: "{{ node_exporter_install_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Download and install node_exporter
      shell: |
        cd /tmp
        wget -q https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
        tar xzf node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
        cp node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter {{ node_exporter_install_dir }}/
        rm -rf node_exporter-{{ node_exporter_version }}.linux-amd64*
      args:
        creates: "{{ node_exporter_install_dir }}/node_exporter"

    - name: Set node_exporter permissions
      file:
        path: "{{ node_exporter_install_dir }}/node_exporter"
        owner: "{{ node_exporter_user }}"
        group: "{{ node_exporter_user }}"
        mode: '0755'

    - name: Create node_exporter systemd service
      template:
        src: ../templates/node-exporter.service.j2
        dest: /etc/systemd/system/node_exporter.service
        owner: root
        group: root
        mode: '0644'
      notify: restart node_exporter

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start node_exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes

    - name: Verify node_exporter is running
      uri:
        url: "http://localhost:{{ node_exporter_port }}/metrics"
        method: GET
        status_code: 200
      retries: 3
      delay: 5

  handlers:
    - name: restart node_exporter
      systemd:
        name: node_exporter
        state: restarted
