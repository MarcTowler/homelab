---
# Media Array (*arr Stack) Deployment
- name: Deploy media-arr stack (Sonarr, Radarr, Lidarr, Prowlarr, Bazarr, Readarr, qBittorrent)
  hosts: media-arr
  gather_facts: yes
  become: yes

  vars:
    media_arr_home: "/var/lib/media-arr"
    config_base: "/config"
    downloads_path: "/downloads"
    media_path: "/media"

  tasks:
    # System preparation
    - include_tasks: ../tasks/common-setup.yml

    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - git
        state: present

    # Docker installation
    - name: Add Docker GPG key
      apt_key:
        url: "https://download.docker.com/linux/ubuntu/gpg"
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker-ce

    - name: Install Docker and Docker Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Enable Docker service
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Create media-arr user group
      group:
        name: media-arr
        state: present

    - name: Create media-arr user
      user:
        name: media-arr
        group: media-arr
        home: "{{ media_arr_home }}"
        shell: /bin/bash
        createhome: yes
        state: present

    # Directory structure
    - name: Create config directories
      file:
        path: "{{ item }}"
        state: directory
        owner: media-arr
        group: media-arr
        mode: '0755'
      loop:
        - "{{ config_base }}"
        - "{{ config_base }}/sonarr"
        - "{{ config_base }}/radarr"
        - "{{ config_base }}/lidarr"
        - "{{ config_base }}/prowlarr"
        - "{{ config_base }}/bazarr"
        - "{{ config_base }}/qbittorrent"
        - "{{ config_base }}/flaresolverr"
        - "{{ config_base }}/jellyfin"
        - "{{ config_base }}/jellyfin/cache"

    - name: Create downloads directory
      file:
        path: "{{ downloads_path }}"
        state: directory
        owner: media-arr
        group: media-arr
        mode: '0755'

    - name: Verify media directory exists and is accessible
      stat:
        path: "{{ media_path }}"
      register: media_stat

    - name: Set permissions on media directory
      file:
        path: "{{ media_path }}"
        owner: media-arr
        group: media-arr
        mode: '0755'
        state: directory
      when: media_stat.stat.exists

    # Deploy Docker Compose configuration
    - name: Deploy docker-compose.yml
      copy:
        src: ../files/media-arr-docker-compose.yml
        dest: "{{ media_arr_home }}/docker-compose.yml"
        owner: media-arr
        group: media-arr
        mode: '0644'

    # Start services
    - name: Start media-arr services
      shell: |
        cd {{ media_arr_home }}
        docker compose up -d
      environment:
        COMPOSE_PROJECT_NAME: "media-arr"

    - name: Wait for services to stabilize
      pause:
        seconds: 15

    # Health checks (using endpoints that don't require API key)
    - name: Verify Sonarr is running
      shell: curl -s -o /dev/null -w "%{http_code}" "http://localhost:8989/login"
      register: sonarr_check
      until: sonarr_check.stdout == "200"
      retries: 5
      delay: 5
      changed_when: false

    - name: Verify Radarr is running
      shell: curl -s -o /dev/null -w "%{http_code}" "http://localhost:7878/login"
      register: radarr_check
      until: radarr_check.stdout == "200"
      retries: 5
      delay: 5
      changed_when: false

    - name: Verify Prowlarr is running
      shell: curl -s -o /dev/null -w "%{http_code}" "http://localhost:9696/login"
      register: prowlarr_check
      until: prowlarr_check.stdout == "200"
      retries: 5
      delay: 5
      changed_when: false

    - name: Verify Lidarr is running
      shell: curl -s -o /dev/null -w "%{http_code}" "http://localhost:8686/login"
      register: lidarr_check
      until: lidarr_check.stdout == "200"
      retries: 5
      delay: 5
      changed_when: false

    - name: Verify Bazarr is running
      shell: "curl -s -o /dev/null -w '%{http_code}' 'http://localhost:6767/login' | grep -E '^(200|302)$'"
      register: bazarr_check
      until: bazarr_check is succeeded
      retries: 5
      delay: 5
      changed_when: false

    - name: Verify qBittorrent is running
      shell: curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080"
      register: qbit_check
      until: qbit_check.stdout == "200"
      retries: 5
      delay: 5
      changed_when: false

    - name: Verify FlareSolverr is running
      shell: curl -s -o /dev/null -w "%{http_code}" "http://localhost:8191/"
      register: flaresolverr_check
      until: flaresolverr_check.stdout == "200"
      retries: 5
      delay: 5
      changed_when: false

    - name: Verify Jellyfin is running
      shell: curl -s -o /dev/null -w "%{http_code}" "http://localhost:8096/System/Info"
      register: jellyfin_check
      until: jellyfin_check.stdout == "200"
      retries: 5
      delay: 5
      changed_when: false

    # Display service information
    - name: Display media-arr stack deployment summary
      debug:
        msg: |
          ✓ Media-ARR Stack Successfully Deployed!
          
          Services Running:
          ✓ Sonarr (TV)          - http://localhost:8989
          ✓ Radarr (Movies)      - http://localhost:7878
          ✓ Lidarr (Music)       - http://localhost:8686
          ✓ Prowlarr (Indexers)  - http://localhost:9696
          ✓ Bazarr (Subtitles)   - http://localhost:6767
          ✓ qBittorrent (Torrent)- http://localhost:8080
          ✓ FlareSolverr (CAPTCHA) - http://localhost:8191
          ✓ Jellyfin (Media Server) - http://localhost:8096
          
          Monitoring: Host Node Exporter (port 9100)
          
          Configuration paths:
          - /config/sonarr
          - /config/radarr
          - /config/lidarr
          - /config/prowlarr
          - /config/bazarr
          - /config/qbittorrent
          - /config/flaresolverr
          - /config/jellyfin
          
          Media storage: {{ media_path }}
          Downloads: {{ downloads_path }}
