---
# Main provisioning playbook

# Pre-task to load vault secrets before any plays execute
- name: Load vault secrets from encrypted inventory
  hosts: all
  gather_facts: no
  pre_tasks:
    - name: Load encrypted vault secrets into Ansible namespace
      include_vars:
        file: "{{ playbook_dir }}/../inventory/secrets.yml"
      run_once: yes

- name: Configure base system
  import_playbook: ../roles/base/main.yml

- name: Configure PHP server
  import_playbook: php-server.yml

- name: Configure MySQL server
  import_playbook: mysql-server.yml

- name: Deploy Traefik reverse proxy
  import_playbook: traefik.yml

- name: Deploy monitoring exporters
  import_playbook: exporter-deployment.yml

- name: Configure MinIO Terraform state backend
  import_playbook: minio-tfstate.yml

- name: Deploy organization GitHub Actions runner
  import_playbook: github-runners.yml
  vars:
    runner_inventory_group: github_runners_org
    runner_vars_file: github_runners.yml

- name: Deploy homelab personal GitHub Actions runner
  import_playbook: github-runners.yml
  vars:
    runner_inventory_group: github_runners_personal_homelab
    runner_vars_file: github_runners_personal_homelab.yml

- name: Deploy LitBot personal GitHub Actions runner
  import_playbook: github-runners.yml
  vars:
    runner_inventory_group: github_runners_personal_litbot
    runner_vars_file: github_runners_personal_litbot.yml

- name: Configure API server
  import_playbook: api.yml

- name: Configure GAPI server
  import_playbook: gapi.yml

- name: Configure Site server
  import_playbook: website.yml

- name: Configure game server
  import_playbook: game-server.yml

- name: Configure homepage server
  import_playbook: homepage.yml

- name: Deploy media-arr stack
  import_playbook: media-arr.yml

- name: Configure media-arr stack
  import_playbook: media-arr-configure.yml
  
- name: Deploy Fitbit health collector stack
  import_playbook: fitbit.yml

- name: Configure monitoring stack
  import_playbook: monitoring.yml

- name: Validate monitoring stack
  import_playbook: validate.yml
