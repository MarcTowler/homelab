---
- name: Deploy Fitbit collector stack
  hosts: fitbit
  gather_facts: yes
  become: yes

  vars_files:
    - ../inventory/secrets.yml

  roles:
    - role: ../roles/docker
      vars:
        docker_user: "{{ fitbit_stack_user }}"

  tasks:
    - include_tasks: ../tasks/common-setup.yml

    - name: Create Fitbit group
      group:
        name: "{{ fitbit_stack_group }}"
        state: present

    - name: Create Fitbit user
      user:
        name: "{{ fitbit_stack_user }}"
        group: "{{ fitbit_stack_group }}"
        home: "{{ fitbit_stack_home }}"
        shell: /bin/bash
        createhome: yes
        state: present

    - name: Create Fitbit stack directories
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ fitbit_stack_home }}", owner: "{{ fitbit_stack_user }}", group: "{{ fitbit_stack_group }}", mode: "0755" }
        - { path: "{{ fitbit_stack_home }}/logs", owner: "1000", group: "1000", mode: "0755" }
        - { path: "{{ fitbit_stack_home }}/tokens", owner: "1000", group: "1000", mode: "0755" }
        - { path: "{{ fitbit_stack_home }}/influxdb", owner: "1500", group: "1500", mode: "0755" }

    - name: Deploy Fitbit docker-compose file
      template:
        src: ../templates/fitbit-docker-compose.yml.j2
        dest: "{{ fitbit_stack_home }}/docker-compose.yml"
        owner: "{{ fitbit_stack_user }}"
        group: "{{ fitbit_stack_group }}"
        mode: "0644"

    - name: Start Fitbit InfluxDB backend
      shell: |
        cd {{ fitbit_stack_home }}
        docker compose up -d influxdb
      args:
        executable: /bin/bash

    - name: Check if Fitbit token bootstrap file exists
      stat:
        path: "{{ fitbit_stack_home }}/tokens/fitbit.token"
      register: fitbit_token_file

    - name: Initialize Fitbit token from vault when missing
      block:
        - name: Create initial Fitbit token file from vault
          copy:
            content: "{{ vault_fitbit_refresh_token }}"
            dest: "{{ fitbit_stack_home }}/tokens/fitbit.token"
            owner: "1000"
            group: "1000"
            mode: "0600"
          when: vault_fitbit_refresh_token is defined and vault_fitbit_refresh_token != ""

        - name: Display bootstrap prompt if vault token not configured
          debug:
            msg: |
              ⚠️  FITBIT TOKEN BOOTSTRAP REQUIRED
              
              The vault_fitbit_refresh_token variable is not configured.
              To complete automated setup:
              
              1. Obtain your Fitbit refresh token:
                 - Run locally: docker compose run --rm fitbit-fetch-data
                 - Follow the OAuth flow
                 - Copy the refresh token provided
              
              2. Add to your secrets.yml vault:
                 vault_fitbit_refresh_token: "YOUR_REFRESH_TOKEN_HERE"
              
              3. Re-run this playbook to complete setup
              
              For now, the fitbit-fetch-data container will start once the token is provided.
          when: vault_fitbit_refresh_token is not defined or vault_fitbit_refresh_token == ""
      
      when: not fitbit_token_file.stat.exists

    - name: Start Fitbit fetch container
      shell: |
        cd {{ fitbit_stack_home }}
        docker compose up -d fitbit-fetch-data
      args:
        executable: /bin/bash
      register: fitbit_startup
      retries: 3
      delay: 5
      until: fitbit_startup is succeeded

    - name: Monitor initial Fitbit fetch
      shell: |
        docker logs fitbit-fetch-data --tail 20
      register: fitbit_logs
      retries: 10
      delay: 6
      until: "'Successfully updated HeartRate' in fitbit_logs.stdout or 'No data' in fitbit_logs.stdout"
      when: fitbit_token_file.stat.exists or (vault_fitbit_refresh_token is defined and vault_fitbit_refresh_token != "")

    - name: Verify InfluxDB API is reachable
      uri:
        url: "http://localhost:{{ fitbit_influxdb_port }}/ping"
        status_code: [200, 204]
      register: fitbit_influx_health
      retries: 5
      delay: 3
      until: fitbit_influx_health.status in [200, 204]
      changed_when: false
