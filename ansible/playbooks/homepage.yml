---
- name: Update the homepage server and install necessary packages
  hosts: homepage
  gather_facts: yes
  become: yes

  tasks:
    - name: Purge legacy Node.js and conflicting packages
      apt:
        name: 
          - nodejs
          - npm
          - libnode-dev
        state: absent
        purge: yes

    - name: Clean up unused dependencies
      apt:
        autoremove: yes

    - name: Fix broken package dependencies (Manual Fallback)
      shell: apt-get install -f -y
      register: repair_result
      changed_when: "'0 upgraded, 0 newly installed' not in repair_result.stdout"

    - name: Ensure repository tools are present
      apt:
        name: 
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create directory for system keys
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download NodeSource GPG key
      get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /etc/apt/keyrings/nodesource.asc
        mode: '0644'

    - name: Add NodeSource repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_20.x nodistro main"
        state: present
        filename: nodesource

    - name: Install modern Node.js v20 (Must be 'latest' to override OS defaults)
      apt:
        name: nodejs
        state: latest
        update_cache: yes

    - name: Install pnpm globally using npm
      npm:
        name: pnpm
        global: yes
        state: present

    - name: Get the latest code from GitHub
      git:
        repo: https://github.com/gethomepage/homepage.git
        dest: /var/www/homepage
        version: main
        force: yes

    - name: Install project dependencies
      command: pnpm install
      args:
        chdir: /var/www/homepage

    - name: Build the homepage application
      command: pnpm build
      args:
        chdir: /var/www/homepage

    - name: Copy systemd service file
      template:
        src: ../templates/homepage.service.j2
        dest: /etc/systemd/system/homepage.service
        mode: '0644'

    - name: Reload systemd and start service
      systemd:
        name: homepage
        state: restarted
        enabled: yes
        daemon_reload: yes