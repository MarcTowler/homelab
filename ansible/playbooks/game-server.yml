- name: Install AMP Game Panel
  hosts: game-server
  become: yes
  tasks:
    # Load vault secrets
    - name: Load vault secrets
      include_vars:
        file: ../inventory/secrets.yml
    
    # System preparation
    - include_tasks: ../tasks/common-setup.yml
    
    - name: Ensure dependencies are present
      apt:
        name: [curl, wget, socat, software-properties-common, dirmngr]
        state: present

    - name: Fix System Locale for AMP
      become: yes
      shell: |
        locale-gen en_GB.UTF-8
        update-locale LANG=en_GB.UTF-8 LC_ALL=en_GB.UTF-8
      register: locale_fix

    - name: Run AMP Unattended Installer
      become: yes
      ansible.builtin.shell: "bash <(wget -qO- getamp.sh)"
      args:
        executable: /bin/bash
      environment:
        # Essential for Unattended Mode
        USE_ANSWERS: "y"
        ANSWER_AMPUSER: "admin"
        ANSWER_AMPPASS: "{{ amp_password }}"
        ANSWER_SYSPASSWORD: "{{ amp_syspassword }}"
        
        # Feature Selections
        ANSWER_INSTALLJAVA: "y"       # Required for ATM10
        ANSWER_INSTALLSRCDSLIBS: "y"  # Required for Steam games like Satisfactory
        ANSWER_INSTALLDOCKER: "y"    # Recommended for security/isolation
        
        # Locale fix from previous step
        LANG: "en_GB.UTF-8"
        LC_ALL: "en_GB.UTF-8"
      async: 600
      poll: 0
      register: amp_install

    - name: Wait for AMP to be ready
      wait_for:
        port: 8080
        delay: 5

    - name: Check if rclone is installed
      command: which rclone
      register: rclone_installed
      ignore_errors: true
      changed_when: false

    - name: Get rclone
      shell: "curl https://rclone.org/install.sh | bash"
      when: rclone_installed.rc != 0

    - name: Create rclone config directory
      file:
        path: /home/amp/.config/rclone
        state: directory
        mode: '0700'
        owner: amp
        group: amp

    - name: Check if rclone config exists
      stat:
        path: /home/amp/.config/rclone/rclone.conf
      register: rclone_conf_stat

    - name: Create rclone config file
      copy:
        dest: /home/amp/.config/rclone/rclone.conf
        owner: amp
        group: amp
        mode: '0600'
        content: |
          [gdrive]
          type = drive
          scope = drive
          token = {"access_token": "{{ rclone_token }}", "token_type":"Bearer","refresh_token": "{{ rclone_refresh_token }}","expiry":"{{ rclone_token_expiry }}","expires_in":3599}
          team_drive =
      when: not rclone_conf_stat.stat.exists

    - name: Check if AMP backup script exists
      stat:
        path: /usr/local/bin/amp_backup.sh
      register: amp_backup_stat

    - name: Create AMP backup script
      copy:
        dest: /usr/local/bin/amp_backup.sh
        mode: '0755'
        owner: amp
        group: amp
        content: |
          #!/bin/bash

          # --- Settings ---
          LOCAL_BACKUP_DIR="/home/amp/.ampdata/instances/LocalServer01/Backups"
          GDRIVE_REMOTE="gdrive:MinecraftBackups"
          LOG_FILE="/home/amp/backup.log"

          # Add a timestamp to the log
          echo "--- Backup started at $(date) ---" >> $LOG_FILE

          # --- The Action ---
          # Using 'copy' keeps the zip on your LXC AND sends it to Google.
          # Using 'move' sends it to Google and deletes it from the LXC.
          rclone copy "$LOCAL_BACKUP_DIR" "$GDRIVE_REMOTE" --update --verbose >> $LOG_FILE 2>&1

          # --- Optional: Cleanup GDrive ---
          # Deletes backups older than 30 days from Google Drive to save space
          rclone delete --min-age 30d "$GDRIVE_REMOTE" >> $LOG_FILE 2>&1

          echo "--- Backup finished at $(date) ---" >> $LOG_FILE
      when: not amp_backup_stat.stat.exists

    - name: Create cron job for AMP backup
      cron:
        name: "AMP Minecraft Backup"
        user: amp
        minute: "0"
        hour: "2"
        job: "/usr/local/bin/amp_backup.sh"
