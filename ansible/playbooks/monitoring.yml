---
# Monitoring Stack Playbook - Prometheus and Grafana (Native Installation)
- name: Deploy Prometheus and Grafana
  hosts: monitoring
  gather_facts: yes
  become: yes

  vars:
    prometheus_version: "2.48.0"
    grafana_version: "10.2.2"
    prometheus_user: prometheus
    grafana_user: grafana
    prometheus_port: 9090
    grafana_port: 3000
    prometheus_config_dir: /etc/prometheus
    prometheus_data_dir: /var/lib/prometheus
    grafana_data_dir: /var/lib/grafana
    prometheus_install_dir: /opt/prometheus
    grafana_install_dir: /opt/grafana
    cluster_nodes:
      - arcanine
      - growlithe
      - fuecoco
      - pawmot
    domain_name: "itslit.me.uk"

  tasks:
    # Load vault secrets
    - name: Load vault secrets
      include_vars:
        file: ../inventory/secrets.yml

    # Install dependencies
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - ca-certificates
          - libfontconfig1
          - adduser
        state: present

    # Create users
    - name: Create Prometheus user
      user:
        name: "{{ prometheus_user }}"
        shell: /usr/sbin/nologin
        home: "{{ prometheus_data_dir }}"
        create_home: yes
        state: present

    - name: Create Grafana user
      user:
        name: "{{ grafana_user }}"
        shell: /usr/sbin/nologin
        home: "{{ grafana_data_dir }}"
        create_home: yes
        state: present

    # Install Prometheus
    - name: Create Prometheus directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_user }}"
        mode: '0755'
      loop:
        - "{{ prometheus_install_dir }}"
        - "{{ prometheus_config_dir }}"
        - "{{ prometheus_data_dir }}"

    - name: Download Prometheus
      shell: |
        cd /tmp
        wget -q https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz
        tar xzf prometheus-{{ prometheus_version }}.linux-amd64.tar.gz
        cp prometheus-{{ prometheus_version }}.linux-amd64/prometheus {{ prometheus_install_dir }}/
        cp prometheus-{{ prometheus_version }}.linux-amd64/promtool {{ prometheus_install_dir }}/
        rm -rf prometheus-{{ prometheus_version }}.linux-amd64*
      args:
        creates: "{{ prometheus_install_dir }}/prometheus"

    - name: Set Prometheus permissions
      file:
        path: "{{ prometheus_install_dir }}/{{ item }}"
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_user }}"
        mode: '0755'
      loop:
        - prometheus
        - promtool

    - name: Copy Prometheus configuration
      template:
        src: ../templates/monitoring/prometheus.yml.j2
        dest: "{{ prometheus_config_dir }}/prometheus.yml"
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_user }}"
        mode: '0644'
      notify: restart prometheus

    - name: Copy Prometheus alert rules
      template:
        src: ../templates/monitoring/prometheus-alerts.yml.j2
        dest: "{{ prometheus_config_dir }}/alert-rules.yml"
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_user }}"
        mode: '0644'
      notify: restart prometheus

    - name: Create Prometheus systemd service
      template:
        src: ../templates/monitoring/prometheus.service.j2
        dest: /etc/systemd/system/prometheus.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - reload systemd
        - restart prometheus

    # Install Grafana
    - name: Create Grafana directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ grafana_user }}"
        group: "{{ grafana_user }}"
        mode: '0755'
      loop:
        - "{{ grafana_install_dir }}"
        - "{{ grafana_data_dir }}"
        - "{{ grafana_data_dir }}/provisioning/datasources"
        - "{{ grafana_data_dir }}/provisioning/dashboards"
        - "/var/log/grafana"

    - name: Download Grafana
      shell: |
        cd /tmp
        wget -q https://dl.grafana.com/oss/release/grafana-{{ grafana_version }}.linux-amd64.tar.gz
        tar xzf grafana-{{ grafana_version }}.linux-amd64.tar.gz
        rm -rf {{ grafana_install_dir }}
        mv grafana-v{{ grafana_version }} {{ grafana_install_dir }}
        rm grafana-{{ grafana_version }}.linux-amd64.tar.gz
      args:
        creates: "{{ grafana_install_dir }}/bin/grafana-server"

    - name: Set Grafana permissions
      file:
        path: "{{ grafana_install_dir }}"
        owner: "{{ grafana_user }}"
        group: "{{ grafana_user }}"
        mode: '0755'
        recurse: yes

    - name: Copy Grafana environment file
      template:
        src: ../templates/monitoring/grafana.env.j2
        dest: /etc/grafana.env
        owner: root
        group: root
        mode: '0644'
      notify: restart grafana

    - name: Copy Grafana datasources config
      template:
        src: ../templates/monitoring/grafana-datasources.yml.j2
        dest: "{{ grafana_data_dir }}/provisioning/datasources/datasources.yml"
        owner: "{{ grafana_user }}"
        group: "{{ grafana_user }}"
        mode: '0644'
      notify: restart grafana

    - name: Copy Grafana dashboards config
      template:
        src: ../templates/monitoring/grafana-dashboards.yml.j2
        dest: "{{ grafana_data_dir }}/provisioning/dashboards.yml"
        owner: "{{ grafana_user }}"
        group: "{{ grafana_user }}"
        mode: '0644'
      notify: restart grafana

    - name: Copy Homelab Overview dashboard
      copy:
        src: ../templates/monitoring/homelab-overview-dashboard.json.j2
        dest: "{{ grafana_data_dir }}/provisioning/dashboards/homelab-overview.json"
        owner: "{{ grafana_user }}"
        group: "{{ grafana_user }}"
        mode: '0644'
      notify: restart grafana

    - name: Create Grafana systemd service
      template:
        src: ../templates/monitoring/grafana.service.j2
        dest: /etc/systemd/system/grafana-server.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - reload systemd
        - restart grafana

    # Start services
    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start Prometheus
      systemd:
        name: prometheus
        state: started
        enabled: yes
      notify: validate prometheus health

    - name: Enable and start Grafana
      systemd:
        name: grafana-server
        state: started
        enabled: yes
      notify: validate grafana health

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart prometheus
      systemd:
        name: prometheus
        state: restarted

    - name: restart grafana
      systemd:
        name: grafana-server
        state: restarted

    - name: validate prometheus health
      uri:
        url: "http://localhost:9090/-/healthy"
        status_code: 200
      retries: 5
      delay: 2
      register: prometheus_health
      failed_when: prometheus_health.status != 200
      changed_when: false

    - name: validate grafana health
      uri:
        url: "http://localhost:3000/api/health"
        status_code: 200
      retries: 5
      delay: 2
      register: grafana_health
      failed_when: grafana_health.status != 200
      changed_when: false


# Configure monitoring on all hosts
- name: Install Node Exporter on all monitored hosts
  hosts: all
  gather_facts: yes
  become: yes

  vars:
    node_exporter_version: "1.7.0"
    node_exporter_install_dir: /opt/node_exporter
    node_exporter_user: node_exporter
    node_exporter_port: 9100

  tasks:
    - name: Create node_exporter user
      user:
        name: "{{ node_exporter_user }}"
        shell: /usr/sbin/nologin
        home: /var/lib/node_exporter
        state: present

    - name: Create node_exporter directory
      file:
        path: "{{ node_exporter_install_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Download node_exporter
      shell: |
        cd /tmp
        wget -q https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
        tar xzf node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
        cp node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter {{ node_exporter_install_dir }}/
        rm -rf node_exporter-{{ node_exporter_version }}.linux-amd64*
      args:
        creates: "{{ node_exporter_install_dir }}/node_exporter"

    - name: Set node_exporter permissions
      file:
        path: "{{ node_exporter_install_dir }}/node_exporter"
        owner: "{{ node_exporter_user }}"
        group: "{{ node_exporter_user }}"
        mode: '0755'

    - name: Create node_exporter systemd service
      template:
        src: ../templates/exporters/node-exporter.service.j2
        dest: /etc/systemd/system/node_exporter.service
        owner: root
        group: root
        mode: '0644'
      notify: restart node_exporter

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start node_exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
      notify: validate node exporter

  handlers:
    - name: restart node_exporter
      systemd:
        name: node_exporter
        state: restarted

    - name: validate node exporter
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 9100
        delay: 1
        timeout: 10
      changed_when: false


# Configure MySQL Exporter
- name: Install MySQL Exporter
  hosts: mysql_servers
  gather_facts: yes
  become: yes

  vars:
    mysql_exporter_version: "0.15.0"
    mysql_exporter_install_dir: /opt/mysql_exporter
    mysql_exporter_user: mysql_exporter
    mysql_exporter_port: 9104

  tasks:
    # Load vault secrets
    - name: Load vault secrets
      include_vars:
        file: ../inventory/secrets.yml

    - name: Create mysql_exporter user
      user:
        name: "{{ mysql_exporter_user }}"
        shell: /usr/sbin/nologin
        home: /var/lib/mysql_exporter
        state: present

    - name: Create mysql_exporter directory
      file:
        path: "{{ mysql_exporter_install_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Download mysql_exporter
      shell: |
        cd /tmp
        wget -q https://github.com/prometheus/mysqld_exporter/releases/download/v{{ mysql_exporter_version }}/mysqld_exporter-{{ mysql_exporter_version }}.linux-amd64.tar.gz
        tar xzf mysqld_exporter-{{ mysql_exporter_version }}.linux-amd64.tar.gz
        cp mysqld_exporter-{{ mysql_exporter_version }}.linux-amd64/mysqld_exporter {{ mysql_exporter_install_dir }}/
        rm -rf mysqld_exporter-{{ mysql_exporter_version }}.linux-amd64*
      args:
        creates: "{{ mysql_exporter_install_dir }}/mysqld_exporter"

    - name: Set mysql_exporter permissions
      file:
        path: "{{ mysql_exporter_install_dir }}/mysqld_exporter"
        owner: "{{ mysql_exporter_user }}"
        group: "{{ mysql_exporter_user }}"
        mode: '0755'

    - name: Create MySQL monitoring user
      mysql_user:
        name: prometheus
        password: "{{ vault_mysql_prometheus_password }}"
        priv: '*.*:PROCESS,REPLICATION CLIENT,SELECT'
        host: 'localhost'
        state: present
        login_unix_socket: /run/mysqld/mysqld.sock
      register: mysql_user_created
      ignore_errors: yes

    - name: Create .my.cnf for mysqld_exporter
      template:
        src: ../templates/exporters/mysql-exporter.cnf.j2
        dest: /etc/mysql_exporter.cnf
        owner: "{{ mysql_exporter_user }}"
        group: "{{ mysql_exporter_user }}"
        mode: '0600'

    - name: Create mysql_exporter systemd service
      template:
        src: ../templates/exporters/mysql-exporter.service.j2
        dest: /etc/systemd/system/mysql_exporter.service
        owner: root
        group: root
        mode: '0644'
      notify: restart mysql_exporter

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start mysql_exporter
      systemd:
        name: mysql_exporter
        state: started
        enabled: yes
      notify: validate mysql exporter

  handlers:
    - name: restart mysql_exporter
      systemd:
        name: mysql_exporter
        state: restarted

    - name: validate mysql exporter
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 9104
        delay: 1
        timeout: 10
      changed_when: false
