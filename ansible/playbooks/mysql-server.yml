---
# MySQL Server Playbook
- name: Install and configure MySQL server
  hosts: mysql_servers
  gather_facts: yes
  become: yes

  pre_tasks:
    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_facts["os_family"] == "Debian"
  
  tasks:
    - name: Install MySQL server
      apt:
        name: 
          - mysql-server
          - python3-pymysql
        state: present
      when: ansible_facts["os_family"] == "Debian"
    
    - name: Ensure MySQL is running and enabled
      service:
        name: mysql
        state: started
        enabled: yes
    
    - name: Force MySQL to listen on all interfaces
      lineinfile:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
        regexp: '(?i)^#?bind-address'
        line: 'bind-address = 0.0.0.0'
        state: present
      notify: Restart MySQL
    
    - name: Create MySQL user for remote API access
      community.mysql.mysql_user:
        name: marctowl_api
        host: "%"
        priv: "*.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock
    
    - name: Create the target database
      community.mysql.mysql_db:
        name: marctowl_itslitapi
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Check if tables already exist in the database
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        login_db: marctowl_itslitapi
        query: SHOW TABLES
      register: table_check

    - name: Setup and import SQL files ONLY if database is empty
      block:
        - name: Ensure temporary directory exists on DB server
          file:
            path: /tmp/mysql_imports
            state: directory
            mode: '0755'

        - name: Copy all SQL files to the server
          copy:
            src: "{{ item }}"
            dest: /tmp/mysql_imports/
          with_fileglob:
            - "../files/sql_imports/*.sql"

        - name: Import all SQL files
          community.mysql.mysql_db:
            name: marctowl_itslitapi
            state: import
            target: "/tmp/mysql_imports/{{ item | basename }}"
            login_unix_socket: /var/run/mysqld/mysqld.sock
          with_fileglob:
            - "../files/sql_imports/*.sql"
      when: table_check.query_result[0] | length == 0

  handlers:
    - name: Restart MySQL
      service:
        name: mysql
        state: restarted