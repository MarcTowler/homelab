---
# API Server Playbook (Refactored to use php-app role)
# Reduced from 134 lines to 24 lines using centralized role

- name: Prepare deploy keys on Ansible controller
  hosts: localhost
  gather_facts: no
  vars:
    role_files_dir: "{{ playbook_dir }}/../roles/php-app/files"
  pre_tasks:
    - name: Load vault secrets
      include_vars:
        file: ../inventory/secrets.yml
    
    - name: Debug - check if vault secret loaded
      debug:
        msg: "api_deploy_key length: {{ api_deploy_key | length }}, first 50 chars: {{ api_deploy_key[:50] }}"

  tasks:
    - name: Ensure role files directory exists
      file:
        path: "{{ role_files_dir }}"
        state: directory
        mode: '0755'
    
    - name: Create deploy key file in role directory
      copy:
        content: "{{ api_deploy_key }}"
        dest: "{{ role_files_dir }}/api_deploy_key"
        mode: '0600'
    
    - name: Verify deploy key file was created
      stat:
        path: "{{ role_files_dir }}/api_deploy_key"
      register: deploy_key_stat
    
    - name: Show deploy key file info
      debug:
        msg: "Deploy key exists: {{ deploy_key_stat.stat.exists }}, size: {{ deploy_key_stat.stat.size }} bytes"

- name: Deploy API Server
  hosts: api
  gather_facts: yes
  become: yes

  roles:
    - role: php-app
      vars:
        app_name: api
        app_root: /var/www/api
        repo_url: git@github.com:ItsLit-Media-and-Development/api.git
        deploy_key: api_deploy_key
