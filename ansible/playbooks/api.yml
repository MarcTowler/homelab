---
# API Server Playbook
# Deploy keys are prepared by the workflow from GitHub secrets

- name: Deploy API Server
  hosts: api
  gather_facts: yes
  become: yes

  roles:
    - role: php-app
      vars:
        app_name: api
        app_root: /var/www/api
        repo_url: git@github.com:ItsLit-Media-and-Development/api.git
        deploy_key: api_deploy_key

