---
# API Server Playbook (Refactored to use php-app role)
# Reduced from 134 lines to 24 lines using centralized role

- name: Deploy API Server
  hosts: api
  gather_facts: yes
  become: yes

  pre_tasks:
    - name: Load vault secrets
      include_vars:
        file: ../inventory/secrets.yml
    - name: Ensure files directory exists
      file:
        path: "{{ playbook_dir }}/../files"
        state: directory
        mode: '0755'
    - name: Create deploy key file
      copy:
        content: "{{ api_deploy_key }}"
        dest: "{{ playbook_dir }}/../files/api_deploy_key"
        mode: '0600'

  roles:
    - role: php-app
      vars:
        app_name: api
        app_root: /var/www/api
        repo_url: git@github.com:ItsLit-Media-and-Development/api.git
        deploy_key: api_deploy_key
