---
# Comprehensive Monitoring Stack Validation Playbook
# This playbook performs health checks on all monitoring components
# Run standalone: ansible-playbook playbooks/validate.yml
# Or as part of deployment: included in site.yml after monitoring.yml

- name: Validate Monitoring Stack Health
  hosts: monitoring
  gather_facts: yes
  become: no

  vars:
    prometheus_url: "http://localhost:9090"
    grafana_url: "http://localhost:3000"

  tasks:
    - name: Validate Prometheus is healthy
      uri:
        url: "{{ prometheus_url }}/-/healthy"
        status_code: 200
      register: prometheus_check
      failed_when: prometheus_check.status != 200
      changed_when: false

    - name: Wait for Prometheus to discover and scrape targets
      pause:
        seconds: 35
      vars:
        ansible_connection: local

    - name: Validate Prometheus targets status
      uri:
        url: "{{ prometheus_url }}/api/v1/targets"
        status_code: 200
        return_content: yes
      register: prometheus_targets
      changed_when: false
      retries: 3
      delay: 10
      until: prometheus_targets.json.data.activeTargets | length > 0

    - name: Parse Prometheus targets
      set_fact:
        active_targets: "{{ (prometheus_targets.json.data.activeTargets | default([])) | length }}"
        inactive_targets: "{{ (prometheus_targets.json.data.droppedTargets | default([])) | length }}"
      changed_when: false

    - name: Display Prometheus target status
      debug:
        msg: |
          ✓ Prometheus Health Check PASSED
          Active Targets: {{ active_targets }}
          Dropped Targets: {{ inactive_targets }}
      changed_when: false

    - name: Fail if no active targets after retries
      fail:
        msg: "ERROR: No active Prometheus targets found after waiting!"
      when: active_targets | int == 0

    - name: Validate Grafana is healthy
      uri:
        url: "{{ grafana_url }}/api/health"
        status_code: 200
      register: grafana_check
      failed_when: grafana_check.status != 200
      changed_when: false

    - name: Display Grafana health check
      debug:
        msg: "✓ Grafana Health Check PASSED"
      changed_when: false

    - name: Validate Grafana provisioned datasources
      uri:
        url: "{{ grafana_url }}/api/datasources"
        status_code: 200
        return_content: yes
        headers:
          Authorization: "Bearer admin"
      register: grafana_datasources
      ignore_errors: yes
      changed_when: false

    - name: Check for Prometheus datasource in Grafana
      debug:
        msg: |
          ✓ Grafana Datasources Found: {{ grafana_datasources.json | default([]) | length }}
          Datasources: {{ grafana_datasources.json | default([]) | list | map(attribute='name') | join(', ') }}
      changed_when: false
      when: grafana_datasources.status == 200


- name: Validate Exporter Health
  hosts: all
  gather_facts: yes
  become: no

  tasks:
    - name: Validate Node Exporter on all hosts
      wait_for:
        host: "{{ ansible_default_ipv4.address }}"
        port: 9100
        delay: 0
        timeout: 5
      register: node_exporter_check
      failed_when: false
      changed_when: false

    - name: Validate Node Exporter metrics
      uri:
        url: "http://{{ ansible_default_ipv4.address }}:9100/metrics"
        status_code: 200
      register: node_metrics
      failed_when: false
      changed_when: false

    - name: Report Node Exporter status
      debug:
        msg: "✓ {{ inventory_hostname }}: Node Exporter HEALTHY (port 9100 responding)"
      when: node_exporter_check.state == 'started'
      changed_when: false

    - name: Report Node Exporter failure
      debug:
        msg: "✗ {{ inventory_hostname }}: Node Exporter UNHEALTHY (port 9100 not responding)"
      when: node_exporter_check.state != 'started'
      changed_when: false


- name: Validate MySQL Exporter
  hosts: mysql_servers
  gather_facts: yes
  become: no

  vars:
    mysql_exporter_port: 9104

  tasks:
    - name: Load vault secrets
      include_vars:
        file: ../inventory/secrets.yml
      no_log: yes

    - name: Validate MySQL Exporter port is open
      wait_for:
        host: "{{ ansible_default_ipv4.address }}"
        port: "{{ mysql_exporter_port }}"
        delay: 0
        timeout: 5
      register: mysql_exporter_port_check
      failed_when: false
      changed_when: false

    - name: Validate MySQL Exporter metrics endpoint
      uri:
        url: "http://{{ ansible_default_ipv4.address }}:{{ mysql_exporter_port }}/metrics"
        status_code: 200
      register: mysql_exporter_metrics
      failed_when: false
      changed_when: false

    - name: Validate MySQL database connectivity
      mysql_query:
        login_unix_socket: /run/mysqld/mysqld.sock
        query: "SELECT 1"
      register: mysql_connectivity
      ignore_errors: yes
      changed_when: false

    - name: Report MySQL Exporter status
      debug:
        msg: |
          ✓ MySQL Exporter HEALTHY
          - Port {{ mysql_exporter_port }} responding
          - Metrics endpoint available
          - Database connectivity OK
      when:
        - mysql_exporter_port_check.state == 'started'
        - mysql_exporter_metrics.status == 200
        - mysql_connectivity.query_result is defined
      changed_when: false

    - name: Report MySQL Exporter issues
      debug:
        msg: |
          ✗ MySQL Exporter Issues Detected:
          - Port {{ mysql_exporter_port }}: {{ "OK" if mysql_exporter_port_check.state == 'started' else "FAILED" }}
          - Metrics endpoint: {{ "OK" if mysql_exporter_metrics.status == 200 else "FAILED" }}
          - Database connectivity: {{ "OK" if mysql_connectivity.query_result is defined else "FAILED" }}
      when:
        - mysql_exporter_port_check.state != 'started' or
          mysql_exporter_metrics.status != 200 or
          mysql_connectivity.query_result is not defined
      changed_when: false

    - name: Display validation summary
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          MONITORING STACK VALIDATION COMPLETE
          ═══════════════════════════════════════════════════════════════
          
          Next Steps:
          1. Verify all exporters show ✓ status above
          2. Log into Grafana: http://{{ groups['monitoring'][0] }}:3000
          3. Check dashboard: Homelab Overview
          4. Review Prometheus targets: http://{{ groups['monitoring'][0] }}:9090/targets
          
          If any checks failed, review logs and run:
            ansible-playbook playbooks/validate.yml --limit=<hostname>
          ═══════════════════════════════════════════════════════════════
      changed_when: false

