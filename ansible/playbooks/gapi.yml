---
# GAPI Server Playbook
# Deploy keys are prepared by the workflow from GitHub secrets

- name: Deploy GAPI Server
  hosts: gapi
  gather_facts: yes
  become: yes

  roles:
    - role: php-app
      vars:
        app_name: gapi
        app_root: /var/www/gapi
        repo_url: git@github.com:ItsLit-Media-and-Development/gapi.git
        deploy_key: gapi_deploy_key

