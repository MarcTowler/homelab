---
# GAPI Server Playbook (Refactored to use php-app role)
# Reduced from 114 lines to 24 lines using centralized role

- name: Deploy GAPI Server
  hosts: gapi
  gather_facts: yes
  become: yes

  pre_tasks:
    - name: Load vault secrets
      include_vars:
        file: ../inventory/secrets.yml

  roles:
    - role: php-app
      vars:
        app_name: gapi
        app_root: /var/www/gapi
        repo_url: git@github.com:ItsLit-Media-and-Development/gapi.git
        deploy_key: gapi_deploy_key
