name: Ansible Playbook Runner

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: "Playbook selector (basename in ansible/playbooks, e.g. api or website)"
        required: true
        type: string
      allow_full_site:
        description: "Set true to allow running the full site.yml aggregate playbook when playbook=site"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      playbook:
        description: "Playbook selector (basename in ansible/playbooks, e.g. api or website)"
        required: true
        type: string
      allow_full_site:
        description: "Set true to allow running the full site.yml aggregate playbook when playbook=site"
        required: false
        type: boolean
        default: false
    secrets:
      ANSIBLE_VAULT_PASSWORD:
        required: true
      ANSIBLE_SSH_PRIVATE_KEY:
        required: false
      API_DEPLOY_KEY:
        required: false
      GAPI_DEPLOY_KEY:
        required: false
      WEBSITE_DEPLOY_KEY:
        required: false

permissions:
  contents: read

jobs:
  run-playbook:
    name: run-playbook
    runs-on:
      - self-hosted
      - linux
      - docker
      - ${{ vars.TERRAFORM_RUNNER_SCOPE || 'homelab' }}
    defaults:
      run:
        shell: bash
        working-directory: .
    env:
      PLAYBOOK_SELECTOR: ${{ inputs.playbook }}
      ALLOW_FULL_SITE: ${{ inputs.allow_full_site }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve and validate playbook selector
        id: resolve
        run: |
          set -euo pipefail

          selector="${PLAYBOOK_SELECTOR}"
          allow_full_site="${ALLOW_FULL_SITE:-false}"
          if [[ -z "${selector}" ]]; then
            echo "::error::Missing required input: playbook"
            exit 1
          fi

          if [[ "${selector}" =~ [^a-zA-Z0-9._-] ]]; then
            echo "::error::Invalid playbook selector '${selector}'. Allowed characters: letters, numbers, '.', '_' and '-'."
            exit 1
          fi

          case "${allow_full_site,,}" in
            true|1|yes|y) allow_full_site="true" ;;
            *) allow_full_site="false" ;;
          esac

          canonical_selector="${selector}"
          case "${selector}" in
            site)
              if [[ "${allow_full_site}" != "true" ]]; then
                echo "::error::Selector 'site' runs the full homelab aggregate playbook (site.yml). Use selector 'website' for the website LXC, or set allow_full_site=true to run full site.yml intentionally."
                exit 1
              fi
              ;;
            website)
              canonical_selector="website"
              ;;
          esac

          mapfile -t allowed < <(find ansible/playbooks -maxdepth 1 -type f -name '*.yml' -printf '%f\n' | sed 's/\.yml$//' | sort)
          if [[ ${#allowed[@]} -eq 0 ]]; then
            echo "::error::No playbooks found in ansible/playbooks/"
            exit 1
          fi

          if ! printf '%s\n' "${allowed[@]}" | grep -Fxq "${canonical_selector}"; then
            echo "::error::Unsupported playbook selector '${selector}'."
            echo "Allowed selectors: $(IFS=,; echo "${allowed[*]}")"
            exit 1
          fi

          resolved_path="ansible/playbooks/${canonical_selector}.yml"
          if [[ ! -f "${resolved_path}" ]]; then
            echo "::error::Resolved playbook path not found: ${resolved_path}"
            exit 1
          fi

          echo "requested_selector=${selector}" >> "${GITHUB_OUTPUT}"
          echo "selector=${canonical_selector}" >> "${GITHUB_OUTPUT}"
          echo "allow_full_site=${allow_full_site}" >> "${GITHUB_OUTPUT}"
          echo "playbook_path=${resolved_path}" >> "${GITHUB_OUTPUT}"
          echo "allowlist=$(IFS=,; echo "${allowed[*]}")" >> "${GITHUB_OUTPUT}"

      - name: Prepare vault password file
        id: vault
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${ANSIBLE_VAULT_PASSWORD}" ]]; then
            echo "::error::Missing required secret: ANSIBLE_VAULT_PASSWORD"
            exit 1
          fi

          vault_file="$(mktemp)"
          chmod 600 "${vault_file}"
          printf '%s' "${ANSIBLE_VAULT_PASSWORD}" > "${vault_file}"
          echo "vault_file=${vault_file}" >> "${GITHUB_OUTPUT}"

      - name: Prepare SSH private key
        id: ssh_key
        env:
          ANSIBLE_SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -n "${ANSIBLE_SSH_PRIVATE_KEY}" ]]; then
            ssh_key_file="$(mktemp)"
            chmod 600 "${ssh_key_file}"
            printf '%s\n' "${ANSIBLE_SSH_PRIVATE_KEY}" | tr -d '\r' > "${ssh_key_file}"
            if ssh-keygen -l -f "${ssh_key_file}" >/dev/null 2>&1; then
              echo "ssh_key_file=${ssh_key_file}" >> "${GITHUB_OUTPUT}"
              echo "cleanup=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "::warning::ANSIBLE_SSH_PRIVATE_KEY is present but invalid; falling back to runner-local key."
            rm -f "${ssh_key_file}"
          fi

          if [[ -f "${HOME}/.ssh/id_ed25519" ]]; then
            chmod 600 "${HOME}/.ssh/id_ed25519" || true
            echo "ssh_key_file=${HOME}/.ssh/id_ed25519" >> "${GITHUB_OUTPUT}"
            echo "cleanup=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::error::Missing SSH authentication for Ansible targets. Set secret ANSIBLE_SSH_PRIVATE_KEY or provision a default key at ~/.ssh/id_ed25519."
          exit 1

      - name: Prepare application deploy key files
        env:
          API_DEPLOY_KEY: ${{ secrets.API_DEPLOY_KEY }}
          GAPI_DEPLOY_KEY: ${{ secrets.GAPI_DEPLOY_KEY }}
          WEBSITE_DEPLOY_KEY: ${{ secrets.WEBSITE_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ansible/playbooks/files ansible/roles/php-app/files

          write_key() {
            local key_name="$1"
            local key_value="$2"
            if [[ -n "${key_value}" ]]; then
              for key_path in \
                "ansible/playbooks/files/${key_name}" \
                "ansible/roles/php-app/files/${key_name}"
              do
                printf '%s\n' "${key_value}" | tr -d '\r' > "${key_path}"
                chmod 600 "${key_path}"
              done
            fi
          }

          write_key "api_deploy_key" "${API_DEPLOY_KEY}"
          write_key "gapi_deploy_key" "${GAPI_DEPLOY_KEY}"
          write_key "website_deploy_key" "${WEBSITE_DEPLOY_KEY}"

          required_deploy_key_name=""
          case "${{ steps.resolve.outputs.selector }}" in
            api) required_deploy_key_name="api_deploy_key" ;;
            gapi) required_deploy_key_name="gapi_deploy_key" ;;
            website) required_deploy_key_name="website_deploy_key" ;;
          esac

          if [[ -n "${required_deploy_key_name}" ]]; then
            if [[ -s "ansible/playbooks/files/${required_deploy_key_name}" || -s "ansible/roles/php-app/files/${required_deploy_key_name}" ]]; then
              echo "Using workflow-provided deploy key for '${{ steps.resolve.outputs.selector }}'."
            else
              echo "::notice::No workflow secret provided for '${{ steps.resolve.outputs.selector }}'; playbook will source '${required_deploy_key_name}' from ansible vault."
            fi
          fi

      - name: Show selection
        run: |
          echo "Requested selector: ${{ steps.resolve.outputs.requested_selector }}"
          echo "Canonical selector: ${{ steps.resolve.outputs.selector }}"
          echo "Full-site opt-in: ${{ steps.resolve.outputs.allow_full_site }}"
          echo "Resolved playbook: ${{ steps.resolve.outputs.playbook_path }}"
          echo "Allowed selectors: ${{ steps.resolve.outputs.allowlist }}"

      - name: Ensure Ansible is available
        run: |
          set -euo pipefail

          if command -v ansible-playbook >/dev/null 2>&1 && command -v ansible-galaxy >/dev/null 2>&1; then
            ansible-playbook --version
            exit 0
          fi

          if ! command -v python3 >/dev/null 2>&1; then
            echo "::error::python3 is required to install ansible-core on this runner."
            exit 1
          fi

          python3 -m ensurepip --upgrade || true
          python3 -m pip install --user --upgrade pip setuptools wheel
          python3 -m pip install --user "ansible-core>=2.16,<2.19"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Install Ansible collections
        env:
          ANSIBLE_COLLECTIONS_PATHS: ${{ github.workspace }}/.ansible/collections
        run: |
          set -euo pipefail
          if [[ ! -f "ansible/requirements.yml" ]]; then
            echo "::error::ansible/requirements.yml not found"
            exit 1
          fi
          ansible-galaxy collection install -r ansible/requirements.yml -p "${ANSIBLE_COLLECTIONS_PATHS}"

      - name: Preflight - Validate host resolution
        env:
          ANSIBLE_COLLECTIONS_PATHS: ${{ github.workspace }}/.ansible/collections
          ANSIBLE_VAULT_PASSWORD_FILE: ${{ steps.vault.outputs.vault_file }}
        run: |
          set -euo pipefail

          # Resolve hosts using the vault password file prepared earlier.
          # Capture output and status explicitly to avoid brittle pipeline parsing.
          set +e
          LIST_HOSTS_OUTPUT="$(ansible-playbook \
            -i ansible/inventory/hosts.yml \
            "${{ steps.resolve.outputs.playbook_path }}" \
            --list-hosts \
            --vault-password-file "${{ steps.vault.outputs.vault_file }}" 2>&1)"
          LIST_HOSTS_EXIT=$?
          set -e

          if [[ "${LIST_HOSTS_EXIT}" -ne 0 ]]; then
            echo "❌ ERROR: Failed to resolve hosts for playbook '${{ steps.resolve.outputs.selector }}'"
            echo ""
            echo "Ansible output:"
            echo "${LIST_HOSTS_OUTPUT}"
            exit 1
          fi

          # Use POSIX-friendly parsing (works with mawk/awk variants on runners).
          HOST_COUNT="$(
            printf '%s\n' "${LIST_HOSTS_OUTPUT}" | \
            sed -nE 's/.*hosts \(([0-9]+)\):.*/\1/p' | \
            awk '{s+=$1} END {print s+0}'
          )"

          if [ "$HOST_COUNT" -eq 0 ]; then
            echo "❌ ERROR: No hosts found for playbook '${{ steps.resolve.outputs.selector }}'"
            echo ""
            echo "Ansible output:"
            echo "${LIST_HOSTS_OUTPUT}"
            echo ""
            echo "Verify:"
            echo "  1. Does the playbook target a valid host group?"
            echo "  2. Does that host group exist in ansible/inventory/hosts.yml?"
            exit 1
          fi
          echo "✅ Found $HOST_COUNT hosts for playbook '${{ steps.resolve.outputs.selector }}'"

      - name: Run selected playbook
        env:
          ANSIBLE_COLLECTIONS_PATHS: ${{ github.workspace }}/.ansible/collections
          ANSIBLE_PRIVATE_KEY_FILE: ${{ steps.ssh_key.outputs.ssh_key_file }}
        run: |
          ansible-playbook \
            -i ansible/inventory/hosts.yml \
            "${{ steps.resolve.outputs.playbook_path }}" \
            --vault-password-file "${{ steps.vault.outputs.vault_file }}"

      - name: Cleanup vault password file
        if: always()
        run: rm -f "${{ steps.vault.outputs.vault_file }}"

      - name: Cleanup SSH private key file
        if: always() && steps.ssh_key.outputs.cleanup == 'true'
        run: rm -f "${{ steps.ssh_key.outputs.ssh_key_file }}"
