name: Terraform PR Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: terraform-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terraform-check:
    name: terraform-check
    runs-on:
      - self-hosted
      - linux
      - docker
      - ${{ vars.TERRAFORM_RUNNER_SCOPE || 'homelab' }}
    defaults:
      run:
        shell: bash
        working-directory: .
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_proxmox_api_url: ${{ secrets.TF_VAR_PROXMOX_API_URL }}
      TF_VAR_proxmox_user: ${{ secrets.TF_VAR_PROXMOX_USER }}
      TF_VAR_proxmox_api_token: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
      TF_VAR_proxmox_password: ${{ secrets.TF_VAR_PROXMOX_PASSWORD }}
      TF_VAR_terraform_password: ${{ secrets.TF_VAR_TERRAFORM_PASSWORD }}
      TF_VAR_node: ${{ secrets.TF_VAR_NODE }}
      TF_VAR_vm_id: ${{ secrets.TF_VAR_VM_ID }}
      TF_VAR_domain_name: ${{ secrets.TF_VAR_DOMAIN_NAME }}
      TF_VAR_cloudflare_dns_token: ${{ secrets.TF_VAR_CLOUDFLARE_DNS_TOKEN }}
      TF_VAR_acme_email: ${{ secrets.TF_VAR_ACME_EMAIL }}
      TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run_terraform=true" >> "${GITHUB_OUTPUT}"
            echo "reason=manual_dispatch" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"

          echo "Changed files:"
          printf '%s\n' "${changed_files}"

          should_run="false"
          while IFS= read -r file; do
            case "${file}" in
              *.tf|*.tfvars|backend.hcl.example|environment/*.tfvars|.github/workflows/*.yml)
                should_run="true"
                break
                ;;
            esac
          done <<< "${changed_files}"

          echo "run_terraform=${should_run}" >> "${GITHUB_OUTPUT}"
          if [[ "${should_run}" == "true" ]]; then
            echo "reason=relevant_changes" >> "${GITHUB_OUTPUT}"
          else
            echo "reason=non_terraform_pr" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip heavy Terraform checks when not needed
        if: steps.changes.outputs.run_terraform != 'true'
        run: echo "No Terraform/workflow changes detected. Marking terraform-check as passed."

      - name: Terraform version
        if: steps.changes.outputs.run_terraform == 'true'
        run: terraform -version

      - name: Load default tfvars for CI
        if: steps.changes.outputs.run_terraform == 'true'
        run: cp environment/dev.tfvars ci.auto.tfvars

      - name: Create backend config
        if: steps.changes.outputs.run_terraform == 'true'
        env:
          MINIO_ENDPOINT: ${{ secrets.TFSTATE_MINIO_ENDPOINT }}
          MINIO_BUCKET: ${{ secrets.TFSTATE_MINIO_BUCKET }}
          MINIO_ACCESS_KEY: ${{ secrets.TFSTATE_MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.TFSTATE_MINIO_SECRET_KEY }}
        run: |
          for required_var in MINIO_ENDPOINT MINIO_BUCKET MINIO_ACCESS_KEY MINIO_SECRET_KEY; do
            if [[ -z "${!required_var}" ]]; then
              echo "::error::Missing required secret for Terraform backend: ${required_var}"
              exit 1
            fi
          done

          MINIO_ENDPOINT_URL="${MINIO_ENDPOINT}"
          if [[ ! "${MINIO_ENDPOINT_URL}" =~ ^https?:// ]]; then
            MINIO_ENDPOINT_URL="http://${MINIO_ENDPOINT_URL}"
          fi

          cat > backend.hcl <<EOF
          bucket = "${MINIO_BUCKET}"
          key    = "env/dev/terraform.tfstate"
          region = "main"
          endpoint = "${MINIO_ENDPOINT_URL}"
          use_path_style = true
          use_lockfile = true
          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          access_key = "${MINIO_ACCESS_KEY}"
          secret_key = "${MINIO_SECRET_KEY}"
          EOF

      - name: Terraform init
        if: steps.changes.outputs.run_terraform == 'true'
        run: terraform init -no-color -reconfigure -backend-config=backend.hcl

      - name: Terraform fmt check
        if: steps.changes.outputs.run_terraform == 'true'
        run: terraform fmt -check -recursive

      - name: Terraform validate
        if: steps.changes.outputs.run_terraform == 'true'
        run: terraform validate

      - name: Terraform plan
        if: steps.changes.outputs.run_terraform == 'true'
        run: terraform plan -lock-timeout=5m -out=tfplan

      - name: Render plan summary
        if: steps.changes.outputs.run_terraform == 'true'
        run: terraform show tfplan > tfplan.txt

      - name: Upload Terraform plan artifact
        if: steps.changes.outputs.run_terraform == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-pr-${{ github.event.pull_request.number || github.run_number }}
          path: tfplan.txt
          if-no-files-found: error
          retention-days: 7

      - name: Cleanup backend config
        if: always()
        run: rm -f backend.hcl tfplan tfplan.txt ci.auto.tfvars
