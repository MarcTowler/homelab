name: Terraform Deploy Main

on:
  push:
    branches:
      - main
    paths:
      - '**/*.tf'
      - '*.tfvars'
      - 'environment/*.tfvars'
      - 'backend.hcl.example'
      - '.github/workflows/terraform-pr-check.yml'
      - '.github/workflows/terraform-deploy-main.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-main-apply
  cancel-in-progress: false

jobs:
  terraform-apply:
    name: terraform-apply
    runs-on:
      - self-hosted
      - linux
      - docker
      - ${{ vars.TERRAFORM_RUNNER_SCOPE || 'homelab' }}
    defaults:
      run:
        shell: bash
        working-directory: .
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_proxmox_api_url: ${{ secrets.TF_VAR_PROXMOX_API_URL }}
      TF_VAR_proxmox_user: ${{ secrets.TF_VAR_PROXMOX_USER }}
      TF_VAR_proxmox_api_token: ${{ secrets.TF_VAR_PROXMOX_API_TOKEN }}
      TF_VAR_proxmox_password: ${{ secrets.TF_VAR_PROXMOX_PASSWORD }}
      TF_VAR_terraform_password: ${{ secrets.TF_VAR_TERRAFORM_PASSWORD }}
      TF_VAR_node: ${{ secrets.TF_VAR_NODE }}
      TF_VAR_vm_id: ${{ secrets.TF_VAR_VM_ID }}
      TF_VAR_domain_name: ${{ secrets.TF_VAR_DOMAIN_NAME }}
      TF_VAR_cloudflare_dns_token: ${{ secrets.TF_VAR_CLOUDFLARE_DNS_TOKEN }}
      TF_VAR_acme_email: ${{ secrets.TF_VAR_ACME_EMAIL }}
      TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform version
        run: terraform -version

      - name: Load default tfvars for CI
        run: cp environment/dev.tfvars ci.auto.tfvars

      - name: Create backend config
        env:
          MINIO_ENDPOINT: ${{ secrets.TFSTATE_MINIO_ENDPOINT }}
          MINIO_BUCKET: ${{ secrets.TFSTATE_MINIO_BUCKET }}
          MINIO_ACCESS_KEY: ${{ secrets.TFSTATE_MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.TFSTATE_MINIO_SECRET_KEY }}
        run: |
          for required_var in MINIO_ENDPOINT MINIO_BUCKET MINIO_ACCESS_KEY MINIO_SECRET_KEY; do
            if [[ -z "${!required_var}" ]]; then
              echo "::error::Missing required secret for Terraform backend: ${required_var}"
              exit 1
            fi
          done

          MINIO_ENDPOINT_URL="${MINIO_ENDPOINT}"
          if [[ ! "${MINIO_ENDPOINT_URL}" =~ ^https?:// ]]; then
            MINIO_ENDPOINT_URL="http://${MINIO_ENDPOINT_URL}"
          fi

          cat > backend.hcl <<EOF
          bucket = "${MINIO_BUCKET}"
          key    = "env/dev/terraform.tfstate"
          region = "main"
          endpoint = "${MINIO_ENDPOINT_URL}"
          use_path_style = true
          use_lockfile = true
          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          access_key = "${MINIO_ACCESS_KEY}"
          secret_key = "${MINIO_SECRET_KEY}"
          EOF

      - name: Terraform init
        run: terraform init -no-color -reconfigure -backend-config=backend.hcl

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Prepare vault password file
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          if [[ -z "${ANSIBLE_VAULT_PASSWORD}" ]]; then
            echo "::error::Missing required secret: ANSIBLE_VAULT_PASSWORD"
            exit 1
          fi

          mkdir -p ansible
          printf '%s' "${ANSIBLE_VAULT_PASSWORD}" > ansible/.vault_pass
          chmod 600 ansible/.vault_pass

      - name: Ensure Ansible is available
        run: |
          set -euo pipefail

          if command -v ansible-playbook >/dev/null 2>&1 && command -v ansible-galaxy >/dev/null 2>&1; then
            ansible-playbook --version
            exit 0
          fi

          if ! command -v python3 >/dev/null 2>&1; then
            echo "::error::python3 is required to install ansible-core on this runner."
            exit 1
          fi

          python3 -m ensurepip --upgrade || true
          python3 -m pip install --user --upgrade pip setuptools wheel
          python3 -m pip install --user "ansible-core>=2.16,<2.19"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Install Ansible collections
        env:
          ANSIBLE_COLLECTIONS_PATHS: ${{ github.workspace }}/.ansible/collections
        run: |
          set -euo pipefail
          if [[ ! -f "ansible/requirements.yml" ]]; then
            echo "::warning::ansible/requirements.yml not found, skipping collection installation"
            exit 0
          fi
          ansible-galaxy collection install -r ansible/requirements.yml -p "${ANSIBLE_COLLECTIONS_PATHS}"



       - name: Prepare application deploy key files
         env:
           API_DEPLOY_KEY: ${{ secrets.API_DEPLOY_KEY }}
           GAPI_DEPLOY_KEY: ${{ secrets.GAPI_DEPLOY_KEY }}
           WEBSITE_DEPLOY_KEY: ${{ secrets.WEBSITE_DEPLOY_KEY }}
         run: |
           set -euo pipefail

           mkdir -p ansible/roles/php-app/files

           write_key() {
             local key_name="$1"
             local key_value="$2"
             if [[ -n "${key_value}" ]]; then
               local key_path="ansible/roles/php-app/files/${key_name}"
               printf '%s\n' "${key_value}" | tr -d '\r' > "${key_path}"
               chmod 600 "${key_path}"
             fi
           }

           write_key "api_deploy_key" "${API_DEPLOY_KEY}"
           write_key "gapi_deploy_key" "${GAPI_DEPLOY_KEY}"
           write_key "website_deploy_key" "${WEBSITE_DEPLOY_KEY}"

      - name: Terraform plan
        run: terraform plan -lock-timeout=5m -out=tfplan

      - name: Terraform apply
        env:
          ANSIBLE_COLLECTIONS_PATHS: ${{ github.workspace }}/.ansible/collections
        run: |
          set -o pipefail
          terraform apply -lock-timeout=5m -auto-approve tfplan 2>&1 | tee terraform-apply.log

      - name: Extract Ansible recap output from apply log
        if: always()
        run: |
          if [[ -f terraform-apply.log ]]; then
            # Extract full Ansible execution segment from first PLAY to last PLAY RECAP
            sed -n '/^PLAY \[/,/^PLAY RECAP/p' terraform-apply.log > ansible-apply.log || true
            
            # If no PLAY RECAP found, try alternative pattern and include last 200 lines of plays
            if [[ ! -s ansible-apply.log ]]; then
              awk '/^PLAY / { flag=1 } flag' terraform-apply.log | tail -200 > ansible-apply.log || true
            fi
          else
            echo "terraform-apply.log not found" > ansible-apply.log
          fi

      - name: Show Ansible recap output in workflow logs
        if: always()
        run: |
          echo "::group::Ansible execution from terraform apply"
          if [[ -s ansible-apply.log ]]; then
            cat ansible-apply.log
          elif [[ -f terraform-apply.log ]]; then
            echo "No Ansible execution output (PLAY headers or PLAY RECAP) found in terraform-apply.log."
          else
            echo "No terraform apply logs were captured."
          fi
          echo "::endgroup::"

      - name: Upload apply logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-logs-${{ github.run_number }}
          path: |
            terraform-apply.log
            ansible-apply.log
          if-no-files-found: warn
          retention-days: 7

      - name: Cleanup backend config
        if: always()
        run: rm -f backend.hcl tfplan ci.auto.tfvars terraform-apply.log ansible-apply.log ansible/.vault_pass


