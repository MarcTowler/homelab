name: Terraform Validation & Drift Detection

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.tf'
      - '.github/workflows/terraform-checks.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.tf'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  terraform:
    runs-on: [self-hosted, linux]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        run: |
          mkdir -p /tmp/tf-bin
          cd /tmp/tf-bin
          wget -q https://releases.hashicorp.com/terraform/1.14.4/terraform_1.14.4_linux_amd64.zip
          python3 -m zipfile -e terraform_1.14.4_linux_amd64.zip .
          chmod +x terraform
          /tmp/tf-bin/terraform version
          echo "/tmp/tf-bin" >> $GITHUB_PATH

      - name: Configure Terraform variables
        run: |
          # Copy dev environment configuration
          cp environment/dev.tfvars terraform.tfvars
          
          # Inject secrets into tfvars (these override dev.tfvars values)
          cat >> terraform.tfvars << 'TFVARS'
          
          # Secrets from GitHub Actions (overrides defaults)
          proxmox_api_url = "${{ secrets.PROXMOX_API_URL }}"
          proxmox_user = "${{ secrets.PROXMOX_USER }}"
          proxmox_password = "${{ secrets.PROXMOX_PASSWORD }}"
          proxmox_api_token = "${{ secrets.PROXMOX_API_TOKEN }}"
          terraform_user = "${{ secrets.TERRAFORM_USER }}"
          terraform_password = "${{ secrets.TERRAFORM_PASSWORD }}"
          proxmox_tls_insecure = "${{ secrets.PROXMOX_TLS_INSECURE }}"
          cloudflare_dns_token = "${{ secrets.CLOUDFLARE_DNS_TOKEN }}"
          TFVARS
          terraform fmt terraform.tfvars

      - name: Download state artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: ./
        continue-on-error: true

      - name: Terraform Format
        run: terraform fmt -check -recursive --ignore-dir=.terraform
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -out=tfplan -no-color > plan.txt 2>&1 || {
            echo "=== TERRAFORM PLAN FAILED ===" >&2
            cat plan.txt >&2
            exit 1
          }
          cat plan.txt

      - name: Upload plan output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: plan.txt
          retention-days: 7

      - name: Upload state artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: terraform.tfstate
          retention-days: 30
