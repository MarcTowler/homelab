name: Terraform Validation & Drift Detection

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.tf'
      - '.github/workflows/terraform-checks.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.tf'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  terraform:
    runs-on: [self-hosted, linux]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform in PATH
        run: |
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "/usr/bin" >> "$GITHUB_PATH"

      - name: Test Terraform
        shell: bash -l {0}
        run: |
          set -x
          terraform version

      - name: Download state artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: ./
        continue-on-error: true

      - name: Configure Terraform variables
        run: |
          cat > terraform.tfvars << 'TFVARS'
          proxmox_api_url = "${{ secrets.PROXMOX_API_URL }}"
          proxmox_user = "${{ secrets.PROXMOX_USER }}"
          proxmox_password = "${{ secrets.PROXMOX_PASSWORD }}"
          proxmox_api_token = "${{ secrets.PROXMOX_API_TOKEN }}"
          terraform_user = "${{ secrets.TERRAFORM_USER }}"
          terraform_password = "${{ secrets.TERRAFORM_PASSWORD }}"
          proxmox_tls_insecure = "${{ secrets.PROXMOX_TLS_INSECURE }}"
          cloudflare_dns_token = "${{ secrets.CLOUDFLARE_DNS_TOKEN }}"
          TFVARS

      - name: Terraform Format
        shell: bash -l {0}
        run: |
          set -x
          terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        shell: bash -l {0}
        run: |
          set -x
          terraform init

      - name: Terraform Validate
        shell: bash -l {0}
        run: |
          set -x
          terraform validate

      - name: Terraform Plan
        id: plan
        shell: bash -l {0}
        run: |
          set -x
          terraform plan -out=tfplan > plan.txt 2>&1
          cat plan.txt

      - name: Upload plan output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: plan.txt
          retention-days: 7

      - name: Upload state artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: terraform.tfstate
          retention-days: 30
