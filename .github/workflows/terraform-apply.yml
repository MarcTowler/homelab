name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - '**.tf'
  workflow_dispatch:

jobs:
  apply:
    runs-on: [self-hosted, linux]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        run: |
          mkdir -p /tmp/tf-bin
          cd /tmp/tf-bin
          wget -q https://releases.hashicorp.com/terraform/1.14.4/terraform_1.14.4_linux_amd64.zip
          python3 -m zipfile -e terraform_1.14.4_linux_amd64.zip .
          chmod +x terraform
          /tmp/tf-bin/terraform version
          echo "/tmp/tf-bin" >> $GITHUB_PATH

      - name: Configure Terraform variables
        run: |
          # Copy dev environment configuration
          cp environment/dev.tfvars terraform.tfvars
          
          # Inject secrets into tfvars (these override dev.tfvars values)
          cat >> terraform.tfvars << 'TFVARS'
          
          # Secrets from GitHub Actions (overrides defaults)
          proxmox_api_url = "${{ secrets.PROXMOX_API_URL }}"
          proxmox_user = "${{ secrets.PROXMOX_USER }}"
          proxmox_password = "${{ secrets.PROXMOX_PASSWORD }}"
          proxmox_api_token = "${{ secrets.PROXMOX_API_TOKEN }}"
          terraform_user = "${{ secrets.TERRAFORM_USER }}"
          terraform_password = "${{ secrets.TERRAFORM_PASSWORD }}"
          proxmox_tls_insecure = "${{ secrets.PROXMOX_TLS_INSECURE }}"
          cloudflare_dns_token = "${{ secrets.CLOUDFLARE_DNS_TOKEN }}"
          TFVARS

      - name: Prepare terraform state directory
        run: |
          mkdir -p /var/lib/github-runner
          echo "Terraform state will be stored at /var/lib/github-runner/terraform.tfstate"

      - name: Sync state from physical machine
        run: |
          # Remote state location on physical machine
          REMOTE_STATE="/home/marctowler/homelab/terraform.tfstate"
          # Try to copy state from physical machine to runner
          # This uses SSH key stored in RUNNER_SSH_KEY secret
          if [[ -n "${{ secrets.RUNNER_SSH_KEY }}" ]]; then
            mkdir -p ~/.ssh
            echo "${{ secrets.RUNNER_SSH_KEY }}" > ~/.ssh/runner_key
            chmod 600 ~/.ssh/runner_key
            
            # Attempt to copy state file from physical machine
            # Adjust hostname if different from 'homelab'
            scp -i ~/.ssh/runner_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              marctowler@${{ secrets.PHYSICAL_MACHINE_HOST }}:${REMOTE_STATE} /var/lib/github-runner/terraform.tfstate 2>/dev/null || {
              echo "Note: Could not sync state from physical machine (expected on first run if state doesn't exist)"
            }
          else
            echo "Note: RUNNER_SSH_KEY secret not configured - skipping state sync from physical machine"
          fi

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply tfplan

      - name: Sync state back to physical machine
        if: always()
        run: |
          # After apply completes, sync the updated state back to physical machine
          REMOTE_STATE="/home/marctowler/homelab/terraform.tfstate"
          if [[ -n "${{ secrets.RUNNER_SSH_KEY }}" ]]; then
            mkdir -p ~/.ssh
            echo "${{ secrets.RUNNER_SSH_KEY }}" > ~/.ssh/runner_key
            chmod 600 ~/.ssh/runner_key
            
            # Copy updated state file back to physical machine
            if [[ -f /var/lib/github-runner/terraform.tfstate ]]; then
              scp -i ~/.ssh/runner_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                /var/lib/github-runner/terraform.tfstate \
                marctowler@${{ secrets.PHYSICAL_MACHINE_HOST }}:${REMOTE_STATE} 2>/dev/null || {
                echo "Warning: Could not sync state back to physical machine"
              }
              echo "State synced back to physical machine"
            fi
          fi

      - name: Post job cleanup
        if: always()
        run: echo "Terraform apply completed"
